name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST
          unzip butler.zip -d butler
          chmod +x butler/butler
          echo "$PWD/butler" >> $GITHUB_PATH
      - name: Push to itch.io
        run: butler push dist/ ${{ secrets.ITCH_USER }}/${{ secrets.ITCH_GAME }}:windows-linux-web
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_KEY }}
